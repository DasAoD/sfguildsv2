name: Docker Build & Push

on:
  workflow_dispatch:
    # Nur manuell auslösbar - automatischer Push-Trigger deaktiviert
    # bis die Containerisierung vollständig umgesetzt ist

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump version
        id: tag
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "new_tag=$NEW_TAG" >> $FORGEMO_OUTPUT
          echo "new_version=${NEW_TAG#v}" >> $FORGEJO_OUTPUT
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            dasaod/sfguildsv2:latest
            dasaod/sfguildsv2:${{ steps.tag.outputs.new_version }}
          build-args: |
            VERSION=${{ steps.tag.outputs.new_version }}

      - name: Update Docker Hub README
        run: |
          TOKEN=$(curl -s -X POST \
            "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${{ secrets.DOCKERHUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKERHUB_TOKEN }}\"}" \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -s -X PATCH \
            "https://hub.docker.com/v2/repositories/dasaod/sfguildsv2/" \
            -H "Authorization: JWT $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\": \"$(cat README.md | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')\"}"
